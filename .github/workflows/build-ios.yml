name: Build iOS IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install dependencies
        run: cd mobile-app && npm ci
      - name: Backup credentials
        run: |
          cp mobile-app/AuthKey_H92XS2QHYH.p8 /tmp/AuthKey_H92XS2QHYH.p8
          echo "Backed up .p8 key file"
      - name: Build IPA locally
        working-directory: mobile-app
        run: eas build --local --platform ios --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Restore credentials and Submit to TestFlight
        working-directory: mobile-app
        run: |
          cp /tmp/AuthKey_H92XS2QHYH.p8 ./AuthKey_H92XS2QHYH.p8 2>/dev/null || true
          echo "AuthKey exists: $(ls -la AuthKey_H92XS2QHYH.p8 2>&1)"
          IPA=$(find . -name "*.ipa" -maxdepth 1 | head -1)
          echo "Found IPA: $IPA"
          eas submit --platform ios --path "$IPA" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile-app/*.ipa
