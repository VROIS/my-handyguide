name: Build iOS IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install dependencies
        run: cd mobile-app && npm ci
      - name: Build IPA locally
        run: cd mobile-app && eas build --local --platform ios --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit to TestFlight
        working-directory: mobile-app
        run: |
          IPA=$(find . -name "*.ipa" -maxdepth 1 2>/dev/null | head -1)
          echo "Found IPA: $IPA"
          eas submit --platform ios --path "$IPA" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile-app/*.ipa
