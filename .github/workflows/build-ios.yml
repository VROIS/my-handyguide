name: Build iOS IPA
on: workflow_dispatch

jobs:
  build:
    # ⚠️ 수정금지(승인필요): EAS 클라우드 빌드 — 로컬(--local) 제거
    # sdk-54 = Xcode 26.0 = iOS 26 SDK (Apple 4/28 마감 대응)
    # 빌드 7(1.0.1) 정상 환경과 동일한 sdk-54 이미지 사용
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install dependencies
        run: cd mobile-app && npm ci
      - name: Restore .p8 key from Secret
        run: |
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > mobile-app/AuthKey_H92XS2QHYH.p8
          echo "AuthKey restored: $(ls -la mobile-app/AuthKey_H92XS2QHYH.p8)"
      - name: Build IPA on EAS Cloud + Submit to TestFlight
        working-directory: mobile-app
        # ⚠️ 수정금지(승인필요): --auto-submit → 빌드 완료 후 자동 TestFlight 제출
        run: eas build --platform ios --profile production --auto-submit --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
