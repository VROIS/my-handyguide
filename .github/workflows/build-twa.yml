name: Build TWA APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create project directories
        run: |
          mkdir -p twa-build/app/src/main/res/values
          mkdir -p twa-build/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa-build/app/src/main/res/drawable
          mkdir -p twa-build/gradle/wrapper
          cp mobile-app/assets/icon-512.png twa-build/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp mobile-app/keystore.jks twa-build/keystore.jks

      - name: Create settings.gradle
        run: |
          echo "include ':app'" > twa-build/settings.gradle

      - name: Create root build.gradle
        run: |
          cat > twa-build/build.gradle << 'ROOTGRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          ROOTGRADLE

      - name: Create gradle.properties
        run: |
          printf '%s\n' \
            'android.useAndroidX=true' \
            'android.nonTransitiveRClass=false' \
            'org.gradle.jvmargs=-Xmx2048m' \
            > twa-build/gradle.properties

      - name: Create app/build.gradle
        run: |
          cat > twa-build/app/build.gradle << 'APPGRADLE'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.sonanie.guide'
              compileSdk 35

              defaultConfig {
                  applicationId "com.sonanie.guide"
                  minSdk 23
                  targetSdk 35
                  versionCode 17
                  versionName "1.1.2"

                  manifestPlaceholders = [
                      hostName    : "my-handyguide1.replit.app",
                      defaultUrl  : "https://my-handyguide1.replit.app",
                      launcherName: "My Handy Guide",
                      assetStatements: '[{ "relation": ["delegate_permission/common.handle_all_urls"], "target": { "namespace": "android_app", "package_name": "com.sonanie.guide", "sha256_cert_fingerprints": ["CD:4A:8A:7F:82:13:A2:74:49:0D:3C:3F:AD:0F:46:41:FF:E0:08:BA:78:DF:36:0B:09:C4:B2:A4:B9:81:6F:BC"] } }]'
                  ]
              }

              signingConfigs {
                  release {
                      storeFile file("../keystore.jks")
                      storePassword "android"
                      keyAlias "key0"
                      keyPassword "android"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          APPGRADLE

      - name: Create AndroidManifest.xml
        run: |
          cat > twa-build/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${launcherName}"
                  android:theme="@android:style/Theme.Translucent.NoTitleBar">
                  <meta-data
                      android:name="asset_statements"
                      android:value='${assetStatements}' />
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="${defaultUrl}" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="${hostName}" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:enabled="true"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          XMLEOF

      - name: Create strings.xml (styles불필요 — android:style/Theme.Translucent.NoTitleBar 사용)
        run: |
          cat > twa-build/app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">My Handy Guide</string>
          </resources>
          STRINGS

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Gradle wrapper
        run: |
          cd twa-build
          gradle wrapper --gradle-version 8.5

      - name: Build AAB
        run: |
          cd twa-build
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload TWA AAB
        uses: actions/upload-artifact@v4
        with:
          name: twa-aab
          path: twa-build/app/build/outputs/bundle/release/app-release.aab
