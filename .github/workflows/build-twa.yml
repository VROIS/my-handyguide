name: Build TWA APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create TWA Gradle project
        run: |
          mkdir -p twa-build/app/src/main/res/values
          mkdir -p twa-build/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa-build/app/src/main/res/drawable

          # 리포지토리 아이콘 복사 (서버 다운로드 대신 로컬 파일 사용)
          cp mobile-app/assets/icon-512.png twa-build/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # settings.gradle
          cat > twa-build/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MyHandyGuide"
          include ':app'
          EOF

          # build.gradle (root)
          cat > twa-build/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # gradle.properties
          cat > twa-build/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # app/build.gradle
          cat > twa-build/app/build.gradle << 'APPEOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.sonanie.guide'
              compileSdk 35

              defaultConfig {
                  applicationId "com.sonanie.guide"
                  minSdk 23
                  targetSdk 35
                  versionCode 26
                  versionName "1.0.1"

                  manifestPlaceholders = [
                      hostName: "my-handyguide1.replit.app",
                      defaultUrl: "https://my-handyguide1.replit.app",
                      launcherName: "My Handy Guide",
                      assetStatements: '[{ "relation": ["delegate_permission/common.handle_all_urls"], "target": { "namespace": "android_app", "package_name": "com.sonanie.guide", "sha256_cert_fingerprints": ["CD:4A:8A:7F:82:13:A2:74:49:0D:3C:3F:AD:0F:46:41:FF:E0:08:BA:78:DF:36:0B:09:C4:B2:A4:B9:81:6F:BC"] } }]'
                  ]
              }

              signingConfigs {
                  release {
                      storeFile file("../keystore.jks")
                      storePassword "android"
                      keyAlias "key0"
                      keyPassword "android"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.7.0'
          }
          APPEOF

          # AndroidManifest.xml
          cat > twa-build/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.VIBRATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${launcherName}"
                  android:theme="@style/Theme.LauncherActivity">

                  <meta-data
                      android:name="asset_statements"
                      android:value='${assetStatements}' />

                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="${defaultUrl}" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="${hostName}" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name="com.google.androidbrowserhelper.trusted.TwaProviderPicker$Action"
                      android:enabled="true"
                      android:exported="false" />

              </application>
          </manifest>
          MANIFEST

          # styles.xml
          cat > twa-build/app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LauncherActivity" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#FFFEFA</item>
                  <item name="android:statusBarColor">#4285F4</item>
                  <item name="android:navigationBarColor">#4285F4</item>
              </style>
          </resources>
          STYLES

          # strings.xml
          cat > twa-build/app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">My Handy Guide</string>
          </resources>
          STRINGS

          # gradle wrapper
          cd twa-build
          gradle wrapper --gradle-version 8.5

      - name: Copy keystore
        run: cp mobile-app/keystore.jks twa-build/keystore.jks

      - name: Build APK
        run: |
          cd twa-build
          ./gradlew assembleRelease --no-daemon

      - name: Upload TWA APK
        uses: actions/upload-artifact@v4
        with:
          name: twa-apk
          path: twa-build/app/build/outputs/apk/release/app-release.apk
