name: Build TWA APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap and expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect > /dev/null 2>&1

      - name: Pre-configure Bubblewrap (skip interactive prompts)
        run: |
          # Bubblewrap 설정 디렉토리 + config 파일 생성
          mkdir -p $HOME/.nicolo-nicolo
          cat > $HOME/.nicolo-nicolo/nicolo-ribaudo.json << CFGEOF
          {"jdkPath":"$JAVA_HOME","androidSdkPath":"$ANDROID_HOME"}
          CFGEOF

      - name: Init TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          expect << 'EXPECTEOF'
          set timeout 180
          spawn bubblewrap init --manifest=https://my-handyguide1.replit.app/manifest.json
          expect {
            -re "JDK.*Y/n" { send "n\r"; exp_continue }
            -re "Path.*JDK" { send "$env(JAVA_HOME)\r"; exp_continue }
            -re "Android SDK.*Y/n" { send "n\r"; exp_continue }
            -re "Path.*Android SDK" { send "$env(ANDROID_HOME)\r"; exp_continue }
            -re "Domain.*:" { send "\r"; exp_continue }
            -re "Display mode.*:" { send "\r"; exp_continue }
            -re "Application name.*:" { send "My Handy Guide\r"; exp_continue }
            -re "Short name.*:" { send "My Handy Guide\r"; exp_continue }
            -re "package.*:" { send "com.sonanie.guide\r"; exp_continue }
            -re "Version name.*:" { send "1.0.1\r"; exp_continue }
            -re "Version code.*:" { send "26\r"; exp_continue }
            -re "Starting URL.*:" { send "/\r"; exp_continue }
            -re "Color.*:" { send "\r"; exp_continue }
            -re "icon.*:" { send "\r"; exp_continue }
            -re "maskable.*:" { send "\r"; exp_continue }
            -re "monochrome.*:" { send "\r"; exp_continue }
            -re "notification.*:" { send "\r"; exp_continue }
            -re "key store.*:" { send "./keystore.jks\r"; exp_continue }
            -re "key.*alias.*:" { send "key0\r"; exp_continue }
            -re "Splash.*:" { send "\r"; exp_continue }
            -re "shortcut.*:" { send "\r"; exp_continue }
            -re "orientation.*:" { send "\r"; exp_continue }
            -re "Settings.*:" { send "\r"; exp_continue }
            -re "source.*:" { send "\r"; exp_continue }
            -re "\\?" { send "\r"; exp_continue }
            "Project generated" { }
            eof { }
          }
          EXPECTEOF

      - name: Copy keystore + override manifest
        run: |
          cp mobile-app/keystore.jks twa-build/keystore.jks

          cat > twa-build/twa-manifest.json << 'TWACFG'
          {
            "packageId": "com.sonanie.guide",
            "host": "my-handyguide1.replit.app",
            "name": "My Handy Guide",
            "launcherName": "My Handy Guide",
            "display": "standalone",
            "themeColor": "#4285F4",
            "navigationColor": "#4285F4",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#4285F4",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#FFFEFA",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://my-handyguide1.replit.app/icon-512.png",
            "maskableIconUrl": "https://my-handyguide1.replit.app/icon-512.png",
            "shortcuts": [],
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "key0"
            },
            "appVersionCode": 26,
            "appVersionName": "1.0.1",
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "orientation": "portrait",
            "fingerprints": [{
              "relation": ["delegate_permission/common.handle_all_urls"],
              "name": "My Handy Guide",
              "value": "CD:4A:8A:7F:82:13:A2:74:49:0D:3C:3F:AD:0F:46:41:FF:E0:08:BA:78:DF:36:0B:09:C4:B2:A4:B9:81:6F:BC"
            }]
          }
          TWACFG

      - name: Build TWA APK
        run: |
          cd twa-build
          expect << 'BUILDEOF'
          set timeout 600
          spawn bubblewrap build --skipPwaValidation
          expect {
            -re "JDK.*Y/n" { send "n\r"; exp_continue }
            -re "Path.*JDK" { send "$env(JAVA_HOME)\r"; exp_continue }
            -re "Android SDK.*Y/n" { send "n\r"; exp_continue }
            -re "Path.*Android SDK" { send "$env(ANDROID_HOME)\r"; exp_continue }
            -re "password" { send "android\r"; exp_continue }
            -re "\\?" { send "\r"; exp_continue }
            "Build result" { }
            eof { }
          }
          BUILDEOF

      - name: Find APK
        run: |
          echo "=== Searching for APK files ==="
          find twa-build -name "*.apk" -type f 2>/dev/null
          echo "=== twa-build root ==="
          ls -la twa-build/ 2>/dev/null
          echo "=== twa-build/app ==="
          ls -la twa-build/app/build/outputs/apk/release/ 2>/dev/null || echo "no release dir"

      - name: Upload TWA APK
        uses: actions/upload-artifact@v4
        with:
          name: twa-apk
          path: twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Upload any APK found
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twa-apk-all
          path: |
            twa-build/**/*.apk
          if-no-files-found: warn
