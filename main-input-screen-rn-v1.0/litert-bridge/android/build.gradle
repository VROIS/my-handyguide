plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.litertbridge'
version = '0.1.0'

android {
  namespace "expo.modules.litertbridge"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
    minSdkVersion 26
  }
  lintOptions {
    abortOnError false
  }
}

// ⚠️ 수정금지(승인필요): LiteRT-LM Gemma 4 E2B 온디바이스 AI 의존성
dependencies {
  implementation("com.google.ai.edge.litertlm:litertlm-android:0.10.0")
}
